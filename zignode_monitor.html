<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZigNode Monitor</title>
    <style>
        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a; color: #e0e0e0;
            display: flex; flex-direction: column;
        }
        /* ---- top bar ---- */
        .top-bar {
            background: #2d2d2d; padding: 8px 20px;
            display: flex; align-items: center; gap: 16px;
            flex-shrink: 0; border-bottom: 1px solid #444; z-index: 2000;
        }
        .top-bar h1 { font-size: 1.2em; margin: 0; color: #e0e0e0; }
        .top-bar input {
            background: #3d3d3d; border: 1px solid #555; color: #e0e0e0;
            padding: 6px 10px; border-radius: 5px; font-size: 14px; width: 120px;
        }
        .top-bar button {
            background: #6a4c93; color: white; border: none;
            padding: 6px 14px; border-radius: 5px; cursor: pointer;
            font-size: 14px; transition: background .3s;
        }
        .top-bar button:hover { background: #5a3c83; }
        .status {
            padding: 5px 10px; border-radius: 5px; font-size: 13px; margin-left: auto;
        }
        .status.connected { background: #2d5a2d; color: #90ee90; }
        .status.error     { background: #5a2d2d; color: #ff9090; }

        /* ---- layout ---- */
        .content-area { display: flex; flex: 1; overflow: hidden; }

        /* ---- sidebar ---- */
        .sidebar {
            width: 240px; flex-shrink: 0;
            background: #1e1e1e; border-right: 1px solid #3a3a3a;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-header {
            padding: 10px 14px; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: .05em;
            color: #888; border-bottom: 1px solid #333; flex-shrink: 0;
        }
        .sidebar-list { overflow-y: auto; flex: 1; padding: 4px 0; }
        .sidebar-node {
            padding: 8px 12px; cursor: pointer;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .sidebar-node:hover { background: #2a2a2a; }
        .sidebar-node.selected { background: #2a2040; border-left-color: #8a6db3; }
        .sidebar-node.inactive { opacity: .5; }
        .sn-top { display: flex; align-items: center; gap: 6px; }
        .sn-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sn-id   { font-size: 10px; color: #777; font-family: monospace; margin-top: 2px; }
        .sn-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }

        /* ---- connection badges ---- */
        .badge {
            font-size: 10px; padding: 1px 6px; border-radius: 10px;
            font-weight: 600; white-space: nowrap;
        }
        .badge-enc  { background: #1a3a33; color: #50e3c2; }
        .badge-ws   { background: #1a2a3a; color: #6ab0ff; }
        .badge-http { background: #2a2a3a; color: #9a8db3; }
        .badge-lora { background: #2a1a3a; color: #d06aff; }
        .badge-active   { background: #1a2d1a; color: #6dcc6d; }
        .badge-inactive { background: #2d1a1a; color: #cc6d6d; }

        /* ---- network canvas ---- */
        .network-container {
            background: #1f1f1f; position: relative;
            overflow: auto; flex: 1;
        }
        .node {
            position: absolute; width: 80px; height: 80px;
            cursor: pointer; transition: transform .3s; user-select: none;
            display: flex; justify-content: center;
        }
        .node:hover { transform: scale(1.1); z-index: 100; }
        .node.selected-node .node-svg { filter: drop-shadow(0 0 8px rgba(138, 109, 179, 0.9)); }
        .node-svg { filter: drop-shadow(0 0 5px rgba(106,76,147,.5)); width: 80px; height: 80px; }
        .node-label {
            position: absolute; top: 85px;
            background: rgba(45,45,45,.9); padding: 3px 6px;
            border-radius: 4px; font-size: 10px;
            border: 1px solid #555; font-family: monospace; white-space: nowrap;
        }

        /* ---- tooltip ---- */
        .node-details {
            position: absolute; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,40,.97); backdrop-filter: blur(8px);
            padding: 14px; border-radius: 8px; border: 1px solid #555;
            max-width: 340px; min-width: 280px;
            z-index: 10000; box-shadow: 0 4px 20px rgba(0,0,0,.6);
            display: none; pointer-events: none;
        }
        .node-details.visible { display: block; }
        .node-details.pos-down { top: 105px; }
        .node-details.pos-up   { bottom: 90px; }
        .node-details .nd-id { font-family: monospace; font-weight: bold; color: #8a6db3; margin-bottom: 8px; font-size: 11px; word-break: break-all; }
        .detail-row { margin-bottom: 4px; display: flex; align-items: flex-start; font-size: 11px; }
        .detail-label { font-weight: bold; min-width: 80px; color: #aaa; }
        .detail-value { color: #e0e0e0; word-break: break-word; }
        .nd-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }

        /* ---- connection lines ---- */
        .connection-line {
            position: absolute; height: 2px;
            transform-origin: left center; z-index: 1; opacity: .7;
        }
        .connection-line.inactive { opacity: .25; }
        .cl-enc  { background: #50e3c2; }
        .cl-ws   { background: #4a6caa; }
        .cl-http { background: #6a4c93; }
        .cl-lora { background: #a04ab3; }

        /* ---- legend ---- */
        .legend {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(30,30,40,.95); padding: 12px 15px;
            border-radius: 6px; font-size: 11px; border: 1px solid #444;
            z-index: 1001;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; gap: 8px; }
        .legend-line { width: 28px; height: 2px; border-radius: 1px; }
        .legend-dot  { width: 12px; height: 12px; border-radius: 3px; }

        /* ---- context menu ---- */
        .context-menu {
            position: absolute; background: #2d2d2d; border: 1px solid #555;
            border-radius: 8px; padding: 6px; min-width: 180px;
            z-index: 20000; display: none; box-shadow: 0 4px 20px rgba(0,0,0,.6);
        }
        .context-menu-item { padding: 7px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .context-menu-item:hover { background: #3d3d3d; }

        /* ---- function modal ---- */
        .function-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,.7);
            display: none; justify-content: center; align-items: center; z-index: 30000;
        }
        .function-modal-content {
            background: #2d2d2d; border: 1px solid #555;
            border-radius: 12px; padding: 25px; min-width: 400px; max-width: 500px;
        }
        .function-modal h3 { margin: 0 0 18px; color: #8a6db3; font-size: 17px; }
        .input-group { margin-bottom: 13px; }
        .input-group label { display: block; margin-bottom: 4px; font-weight: 600; color: #ccc; font-size: 13px; }
        .function-modal input, .function-modal select, .function-modal textarea {
            width: 100%; background: #3d3d3d; border: 1px solid #555; color: #e0e0e0;
            padding: 7px 10px; border-radius: 5px; font-size: 13px; box-sizing: border-box;
        }
        .function-modal textarea { resize: vertical; min-height: 70px; }
        .button-group { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .function-modal button {
            background: #6a4c93; color: white; border: none;
            padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        .function-modal button:hover { background: #5a3c83; }
        .function-modal button.cancel { background: #555; }
        .function-modal button.cancel:hover { background: #4a4a4a; }
        .function-result {
            margin-top: 13px; padding: 10px; border-radius: 5px;
            border: 1px solid #555; background: #1a1a1a;
            font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-word;
            max-height: 200px; overflow-y: auto;
        }
        .function-result.success { border-color: #50e3c2; color: #50e3c2; }
        .function-result.error   { border-color: #e35064; color: #e35064; }
    </style>
</head>
<body>
    <div class="top-bar">
        <h1>⬡ ZigNode Monitor</h1>
        <div style="display:flex;align-items:center;gap:10px">
            <label>Host:</label><input type="text" id="host" value="127.0.0.1">
            <label>Port:</label><input type="text" id="port" value="8635" style="width:70px">
            <button onclick="toggleConnection()">Connect</button>
            <button onclick="refreshData()">↻</button>
            <label style="font-size:13px"><input type="checkbox" id="autoRefresh" checked> Auto</label>
        </div>
        <div id="status" class="status">Disconnected</div>
    </div>

    <div class="content-area">
        <!-- sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Nodes (<span id="nodeCount">0</span>)</div>
            <div class="sidebar-list" id="sidebarList"></div>
        </div>

        <!-- graph -->
        <div class="network-container" id="networkContainer">
            <div class="legend">
                <div style="font-size:10px;color:#888;margin-bottom:6px;font-weight:600">CONNECTION</div>
                <div class="legend-item"><div class="legend-line" style="background:#50e3c2"></div><span>🔒 Encrypted WS</span></div>
                <div class="legend-item"><div class="legend-line" style="background:#4a6caa"></div><span>⚡ WebSocket</span></div>
                <div class="legend-item"><div class="legend-line" style="background:#6a4c93"></div><span>HTTP</span></div>
                <div class="legend-item"><div class="legend-line" style="background:#a04ab3"></div><span>📻 LoRa</span></div>
                <div style="font-size:10px;color:#888;margin:8px 0 6px;font-weight:600">NODES</div>
                <div class="legend-item"><div class="legend-dot" style="background:#6a4c93"></div><span>This node</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#4a6c93"></div><span>Direct abut</span></div>
                <div class="legend-item"><div class="legend-dot" style="background:#934a6c"></div><span>Nested abut</span></div>
            </div>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div id="contextMenuItems"></div>
        <div class="context-menu-item" onclick="executeFunction('custom')">⌨ Custom call…</div>
    </div>

    <div class="function-modal" id="functionModal">
        <div class="function-modal-content">
            <h3 id="modalTitle">Execute Function</h3>
            <div class="input-group">
                <label>Target Node ID:</label>
                <input type="text" id="targetNodeId" readonly>
            </div>
            <div class="input-group">
                <label>Function:</label>
                <input type="text" id="functionName" placeholder="function name">
            </div>
            <div class="input-group">
                <label>Args (JSON array):</label>
                <textarea id="functionParams" placeholder='["arg1"] or empty'></textarea>
            </div>
            <div class="input-group">
                <label>Kwargs (JSON object):</label>
                <textarea id="functionKwargs" placeholder='{"key": "val"} or empty'></textarea>
            </div>
            <div class="button-group">
                <button class="cancel" onclick="closeFunctionModal()">Cancel</button>
                <button onclick="sendFunction()">Execute</button>
            </div>
            <div id="functionResult" class="function-result" style="display:none"></div>
        </div>
    </div>

    <script>
        let isConnected = false, refreshInterval = null;
        let currentSelectedNode = null, networkData = null;
        let highlightedNode = null;

        // ── connection type ─────────────────────────────────────────────
        function connType(nodeData) {
            if (!nodeData) return 'http';
            if (nodeData.encrypted_ws_enabled) return 'enc';
            if (nodeData.lora_enabled)         return 'lora';
            if (nodeData.ws_enabled)            return 'ws';
            return 'http';
        }
        function connLabel(type) {
            return { enc: '🔒 Enc WS', ws: '⚡ WS', lora: '📻 LoRa', http: 'HTTP' }[type] || 'HTTP';
        }
        function connBadgeClass(type) {
            return { enc: 'badge-enc', ws: 'badge-ws', lora: 'badge-lora', http: 'badge-http' }[type] || 'badge-http';
        }
        function connLineClass(type) {
            return { enc: 'cl-enc', ws: 'cl-ws', lora: 'cl-lora', http: 'cl-http' }[type] || 'cl-http';
        }

        // ── core ─────────────────────────────────────────────────────────
        function toggleConnection() { isConnected ? disconnect() : connect(); }

        function connect() {
            const h = document.getElementById('host').value, p = document.getElementById('port').value;
            if (!h || !p) { updateStatus('Host/port required', 'error'); return; }
            isConnected = true;
            document.querySelector('.connection-controls button, .top-bar button').textContent = 'Disconnect';
            refreshData();
            if (document.getElementById('autoRefresh').checked)
                refreshInterval = setInterval(refreshData, 5000);
        }

        function disconnect() {
            if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
            isConnected = false;
            document.querySelectorAll('.top-bar button')[0].textContent = 'Connect';
            updateStatus('Disconnected', 'error');
            clearNetwork(); updateSidebar(null);
        }

        function updateStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = 'status ' + type;
        }

        async function refreshData() {
            if (!isConnected) return;
            const h = document.getElementById('host').value, p = document.getElementById('port').value;
            try {
                const r = await fetch(`http://${h}:${p}/status`, { cache: 'no-cache', mode: 'cors' });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                if (!data.id) throw new Error('Invalid response');
                networkData = data;
                updateStatus(`${new Date().toLocaleTimeString()}`, 'connected');
                renderNetwork(data);
                updateSidebar(data);
            } catch(e) {
                updateStatus(`Error: ${e.message}`, 'error');
                disconnect();
            }
        }

        // ── sidebar ───────────────────────────────────────────────────────
        function updateSidebar(data) {
            const list = document.getElementById('sidebarList');
            const count = document.getElementById('nodeCount');
            list.innerHTML = '';
            if (!data) { count.textContent = '0'; return; }

            const allNodes = [];
            // main node
            allNodes.push({ id: data.id, d: data, role: 'main' });
            // direct abuts
            Object.entries(data.abut_nodes || {}).forEach(([id, d]) => {
                allNodes.push({ id, d, role: 'direct' });
                // nested
                Object.entries(d?.abut_nodes || {}).forEach(([nid, nd]) => {
                    if (!allNodes.find(n => n.id === nid))
                        allNodes.push({ id: nid, d: nd, role: 'nested' });
                });
            });

            count.textContent = allNodes.length;

            allNodes.forEach(({ id, d, role }) => {
                const active = d.active === undefined ? true : d.active;
                const ct = connType(d);
                const div = document.createElement('div');
                div.className = 'sidebar-node' + (active ? '' : ' inactive') + (id === highlightedNode ? ' selected' : '');
                div.dataset.nodeId = id;
                div.innerHTML = `
                    <div class="sn-top">
                        <div class="sn-name">${d.hostname || d.myname || id.slice(0,8)}</div>
                        <span class="badge ${connBadgeClass(ct)}">${connLabel(ct)}</span>
                    </div>
                    <div class="sn-id">${id.slice(0,8)}…</div>
                    <div class="sn-meta">
                        <span class="badge ${active ? 'badge-active' : 'badge-inactive'}">${active ? 'active' : 'offline'}</span>
                        ${d.version ? `<span style="font-size:10px;color:#666">v${d.version}</span>` : ''}
                        ${role === 'nested' ? '<span style="font-size:10px;color:#666">nested</span>' : ''}
                    </div>`;
                div.addEventListener('click', () => selectNode(id));
                list.appendChild(div);
            });
        }

        function selectNode(id) {
            highlightedNode = id;
            // update sidebar highlights
            document.querySelectorAll('.sidebar-node').forEach(el =>
                el.classList.toggle('selected', el.dataset.nodeId === id));
            // highlight in graph
            document.querySelectorAll('.node').forEach(el =>
                el.classList.toggle('selected-node', el.dataset.nodeId === id));
            // show detail panel
            currentSelectedNode = id;
        }

        // ── graph ─────────────────────────────────────────────────────────
        function clearNetwork() {
            Array.from(document.getElementById('networkContainer').children)
                .forEach(c => { if (!c.classList.contains('legend')) c.remove(); });
        }

        function renderNetwork(data) {
            clearNetwork();
            const cont = document.getElementById('networkContainer');
            const cr = cont.getBoundingClientRect();
            const cx = cr.width / 2, cy = cr.height / 2;
            const pos = new Map();

            pos.set(data.id, { x: cx, y: cy, type: 'main' });

            const directs = Object.values(data.abut_nodes || {});
            const r1 = Math.min(cr.width, cr.height) / 4;
            directs.forEach((n, i) => {
                const a = (i * 2 * Math.PI) / directs.length;
                pos.set(n.id, { x: cx + Math.cos(a) * r1, y: cy + Math.sin(a) * r1, type: 'direct' });
            });

            const r2 = Math.min(cr.width, cr.height) / 2.5;
            directs.forEach((par, pi) => {
                Object.values(par?.abut_nodes || {}).forEach((n, ni, arr) => {
                    if (!pos.has(n.id)) {
                        const pa = (pi * 2 * Math.PI) / directs.length;
                        const na = pa + (ni - arr.length / 2 + .5) * .3;
                        pos.set(n.id, { x: cx + Math.cos(na) * r2, y: cy + Math.sin(na) * r2, type: 'nested' });
                    }
                });
            });

            // connections
            Object.entries(data.abut_nodes || {}).forEach(([id, n]) => {
                const np = pos.get(n.id);
                if (np) drawLine(pos.get(data.id), np, cont, n.active, connType(n));
                Object.values(n?.abut_nodes || {}).forEach(nn => {
                    const nnp = pos.get(nn.id);
                    if (nnp) drawLine(np, nnp, cont, nn.active, connType(nn));
                });
            });

            // nodes
            pos.forEach((p, id) => {
                let d = id === data.id ? data : (data.abut_nodes[id] || null);
                if (!d) for (const par of directs) if (par?.abut_nodes?.[id]) { d = par.abut_nodes[id]; break; }
                drawNode(id, d || {}, p);
            });
        }

        function drawLine(p1, p2, cont, active = true, ct = 'http') {
            if (!p1 || !p2) return;
            const line = document.createElement('div');
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            line.className = `connection-line ${connLineClass(ct)}${active ? '' : ' inactive'}`;
            line.style.cssText = `width:${Math.sqrt(dx*dx+dy*dy)}px;left:${p1.x}px;top:${p1.y}px;transform:rotate(${Math.atan2(dy,dx)}rad)`;
            cont.appendChild(line);
        }

        function drawNode(nodeId, nodeData, pos) {
            const cont = document.getElementById('networkContainer');
            const node = document.createElement('div');
            node.className = 'node' + (nodeId === highlightedNode ? ' selected-node' : '');
            node.style.cssText = `left:${pos.x-40}px;top:${pos.y-40}px`;
            node.dataset.nodeId = nodeId;

            const color = pos.type === 'main' ? '#6a4c93' : pos.type === 'direct' ? '#4a6c93' : '#934a6c';
            const active = nodeData.active === undefined ? true : nodeData.active;
            const ct = connType(nodeData);
            const addr = nodeData.addresses?.length ? nodeData.addresses[0].join(':') : (nodeData.ip || '');

            const capsBadges = (nodeData.capabilities || []).slice(0,6).map(c =>
                `<span style="font-size:9px;background:#333;padding:1px 4px;border-radius:3px;margin:1px">${c}</span>`
            ).join('');

            node.innerHTML = `
                <svg class="node-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="${color}" stroke="#000" stroke-width="1.5" d="M4.75 8L12 4l7.25 4v8L12 20l-7.25-4V8Z"/>
                </svg>
                <div class="node-label">${nodeData.hostname || nodeId.slice(0,8)}</div>
                <div class="node-details">
                    <div class="nd-id">${nodeId}</div>
                    <div class="nd-badges">
                        <span class="badge ${connBadgeClass(ct)}">${connLabel(ct)}</span>
                        <span class="badge ${active ? 'badge-active' : 'badge-inactive'}">${active ? 'active' : 'offline'}</span>
                        ${nodeData.lora_enabled ? '<span class="badge badge-lora">📻 LoRa</span>' : ''}
                    </div>
                    <div style="margin-top:8px">
                    <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${nodeData.myname || '—'}</span></div>
                    <div class="detail-row"><span class="detail-label">Hostname</span><span class="detail-value">${nodeData.hostname || '—'}</span></div>
                    <div class="detail-row"><span class="detail-label">Address</span><span class="detail-value">${addr || '—'}</span></div>
                    <div class="detail-row"><span class="detail-label">Version</span><span class="detail-value">${nodeData.version || '—'}</span></div>
                    <div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value">${nodeData.platform || '—'}</span></div>
                    <div class="detail-row"><span class="detail-label">Last seen</span><span class="detail-value">${fmtTime(nodeData.last_seen)}</span></div>
                    ${nodeData.capabilities ? `<div class="detail-row"><span class="detail-label">Caps</span><span class="detail-value" style="display:flex;flex-wrap:wrap;gap:2px">${capsBadges}</span></div>` : ''}
                    </div>
                </div>`;

            const tip = node.querySelector('.node-details');
            node.addEventListener('mouseenter', () => positionTip(node, tip));
            node.addEventListener('mouseleave', e => {
                if (!e.relatedTarget?.closest('.context-menu'))
                    tip.classList.remove('visible','pos-up','pos-down');
            });
            node.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, nodeId); });
            node.addEventListener('click', e => { if (e.detail === 2) { currentSelectedNode = nodeId; executeFunction('custom'); } else selectNode(nodeId); });
            cont.appendChild(node);
        }

        function positionTip(nodeEl, tip) {
            const nr = nodeEl.getBoundingClientRect();
            const cr = document.getElementById('networkContainer').getBoundingClientRect();
            tip.style.visibility = 'hidden'; tip.classList.add('visible');
            const h = tip.offsetHeight; tip.classList.remove('visible'); tip.style.visibility = '';
            tip.classList.add(cr.bottom - nr.bottom < h + 20 ? 'pos-up' : 'pos-down', 'visible');
        }

        function fmtTime(ts) {
            if (!ts) return '—';
            const s = Math.round(Date.now()/1000 - ts);
            if (s < 60) return `${s}s ago`;
            if (s < 3600) return `${Math.round(s/60)}m ago`;
            return new Date(ts*1000).toLocaleTimeString();
        }

        // ── context menu ──────────────────────────────────────────────────
        function showCtxMenu(e, nodeId) {
            currentSelectedNode = nodeId;
            const menu = document.getElementById('contextMenu');
            const items = document.getElementById('contextMenuItems');
            const caps = (getNodeData(nodeId).capabilities || []);
            items.innerHTML = caps.map(c =>
                `<div class="context-menu-item" onclick="executeFunction('capability','${c}')">${c}</div>`
            ).join('');
            menu.style.cssText = `display:block;left:${e.pageX}px;top:${e.pageY}px`;
        }

        function hideCtxMenu() { document.getElementById('contextMenu').style.display = 'none'; }

        function getNodeData(id) {
            if (!networkData) return {};
            if (id === networkData.id) return networkData;
            if (networkData.abut_nodes?.[id]) return networkData.abut_nodes[id];
            for (const p of Object.values(networkData.abut_nodes || {}))
                if (p?.abut_nodes?.[id]) return p.abut_nodes[id];
            return {};
        }

        // ── function modal ────────────────────────────────────────────────
        function executeFunction(type, fn = null) {
            hideCtxMenu();
            document.getElementById('targetNodeId').value = currentSelectedNode;
            document.getElementById('modalTitle').textContent = fn ? `Execute: ${fn}` : 'Custom Function';
            document.getElementById('functionName').value = fn || '';
            document.getElementById('functionParams').value = '[]';
            document.getElementById('functionKwargs').value = '{}';
            document.getElementById('functionResult').style.display = 'none';
            document.getElementById('functionModal').style.display = 'flex';
        }

        function closeFunctionModal() { document.getElementById('functionModal').style.display = 'none'; }

        async function sendFunction() {
            const nodeId = document.getElementById('targetNodeId').value;
            const fn = document.getElementById('functionName').value.trim();
            const argsRaw = document.getElementById('functionParams').value.trim();
            const kwargsRaw = document.getElementById('functionKwargs').value.trim();
            const h = document.getElementById('host').value, p = document.getElementById('port').value;
            if (!fn) { showResult('Function name required', 'error'); return; }
            let args = [], kwargs = {};
            try { if (argsRaw)   args   = JSON.parse(argsRaw); }   catch(e) { showResult(`Args error: ${e.message}`, 'error'); return; }
            try { if (kwargsRaw) kwargs = JSON.parse(kwargsRaw); } catch(e) { showResult(`Kwargs error: ${e.message}`, 'error'); return; }
            showResult('…', 'info');
            try {
                const payload = { call: fn, args, id: nodeId };
                if (Object.keys(kwargs).length) payload.kwargs = kwargs;
                const r = await fetch(`http://${h}:${p}/`, {
                    method: 'POST', mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const txt = await r.text();
                let parsed; try { parsed = JSON.parse(txt); } catch { parsed = txt; }
                showResult(JSON.stringify(parsed, null, 2), r.ok ? 'success' : 'error');
            } catch(e) { showResult(`Network: ${e.message}`, 'error'); }
        }

        function showResult(msg, type) {
            const el = document.getElementById('functionResult');
            el.textContent = msg; el.className = 'function-result ' + type; el.style.display = 'block';
        }

        // ── events ────────────────────────────────────────────────────────
        document.addEventListener('click', e => {
            if (!e.target.closest('.context-menu') && !e.target.closest('.node')) hideCtxMenu();
        });
        document.getElementById('functionModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeFunctionModal();
        });
        document.getElementById('autoRefresh').addEventListener('change', () => {
            if (!isConnected) return;
            if (document.getElementById('autoRefresh').checked) {
                if (!refreshInterval) refreshInterval = setInterval(refreshData, 5000);
            } else if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
        });
        document.querySelectorAll('.top-bar input').forEach(i =>
            i.addEventListener('keypress', e => { if (e.key === 'Enter') toggleConnection(); }));
        window.addEventListener('load', () => {
            if (document.getElementById('host').value) connect();
        });
    </script>
</body>
</html>
